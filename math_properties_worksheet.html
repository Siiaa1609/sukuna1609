<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Properties of Operations — Worksheet</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --ink-mid: #4a3f2f;
    --ink-light: #8a7d6a;
    --paper: #faf7f2;
    --paper-rule: #e8e0d0;
    --accent: #8b3a0f;
    --accent-light: #f5ede3;
    --accent2: #2d5a3d;
    --accent2-light: #e8f0eb;
    --rule-line: #d4c9b5;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #e8e0d0;
    font-family: 'Source Serif 4', Georgia, serif;
    color: var(--ink);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .page {
    background: var(--paper);
    max-width: 820px;
    margin: 0 auto;
    padding: 3rem 3.5rem;
    box-shadow: 0 4px 40px rgba(0,0,0,0.18), 0 1px 4px rgba(0,0,0,0.08);
    position: relative;
  }

  .page::before {
    content: '';
    position: absolute;
    left: 72px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: #e8a080;
    opacity: 0.5;
  }

  /* HEADER */
  .ws-header {
    text-align: center;
    border-bottom: 2.5px solid var(--ink);
    padding-bottom: 1.25rem;
    margin-bottom: 1.5rem;
    position: relative;
  }

  .ws-header::after {
    content: '';
    display: block;
    width: 60%;
    height: 1px;
    background: var(--ink-mid);
    margin: 6px auto 0;
    opacity: 0.3;
  }

  .ws-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--ink);
    line-height: 1.2;
  }

  .ws-subtitle {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-top: 6px;
    font-weight: 300;
  }

  /* STUDENT INFO */
  .info-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule-line);
  }

  .info-field {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .info-label {
    font-size: 9px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-light);
    font-weight: 600;
  }

  .info-line {
    border: none;
    border-bottom: 1.5px solid var(--ink-mid);
    background: transparent;
    padding: 4px 0;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    width: 100%;
  }

  .info-line:focus { border-bottom-color: var(--accent); }

  /* SECTION HEADER */
  .section-hd {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 1.75rem 0 0.9rem;
  }

  .section-tag {
    font-family: 'Playfair Display', serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    padding: 3px 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .section-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-mid);
    letter-spacing: 0.05em;
  }

  .section-rule {
    flex: 1;
    height: 1px;
    background: var(--rule-line);
  }

  /* QUESTION */
  .q {
    margin-bottom: 1.25rem;
    padding: 0.85rem 1rem 0.85rem 0;
    border-bottom: 1px dashed var(--rule-line);
    page-break-inside: avoid;
    break-inside: avoid;
  }

  .q-row {
    display: flex;
    gap: 0.75rem;
    align-items: flex-start;
    margin-bottom: 0.6rem;
  }

  .q-num {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--accent);
    min-width: 22px;
    line-height: 1.5;
    flex-shrink: 0;
  }

  .q-text {
    font-size: 14px;
    line-height: 1.65;
    color: var(--ink);
    flex: 1;
  }

  .expr {
    font-style: italic;
    font-weight: 600;
    color: var(--ink);
    background: var(--accent-light);
    padding: 1px 5px;
    border-radius: 3px;
    border-left: 2px solid var(--accent);
  }

  /* OPTIONS */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5px 1.5rem;
    margin: 0.5rem 0 0.5rem 1.75rem;
  }

  .opt-label {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    cursor: pointer;
    font-size: 13px;
    line-height: 1.5;
    color: var(--ink-mid);
    padding: 4px 6px;
    border-radius: 3px;
    transition: background 0.12s;
    border: 1px solid transparent;
  }

  .opt-label:hover { background: var(--accent-light); }

  .opt-label input[type=radio] { display: none; }

  .opt-bubble {
    width: 15px; height: 15px;
    border-radius: 50%;
    border: 1.5px solid var(--ink-mid);
    flex-shrink: 0;
    margin-top: 2px;
    transition: all 0.12s;
    background: white;
    position: relative;
  }

  .opt-label input[type=radio]:checked ~ .opt-bubble {
    background: var(--accent);
    border-color: var(--accent);
  }

  .opt-label input[type=radio]:checked ~ .opt-bubble::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 5px; height: 5px;
    border-radius: 50%;
    background: white;
  }

  .opt-label input[type=radio]:checked ~ .opt-text { color: var(--accent); font-weight: 600; }

  /* FILL-IN */
  .fill-wrap {
    margin: 0.5rem 0 0.4rem 1.75rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .fill-label { font-size: 12px; color: var(--ink-light); font-style: italic; }

  .fill-input {
    flex: 1;
    max-width: 320px;
    border: none;
    border-bottom: 1.5px solid var(--ink-mid);
    background: transparent;
    font-family: 'Source Serif 4', serif;
    font-size: 14px;
    font-style: italic;
    color: var(--ink);
    outline: none;
    padding: 3px 6px;
  }

  .fill-input:focus { border-bottom-color: var(--accent); }

  /* SCRIBBLE */
  .scribble-wrap {
    margin: 0.5rem 0 0 1.75rem;
  }

  .scribble-label {
    font-size: 9px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-light);
    margin-bottom: 3px;
    display: block;
  }

  .scribble {
    width: 100%;
    min-height: 44px;
    border: 1px dashed var(--rule-line);
    background: repeating-linear-gradient(
      transparent,
      transparent 20px,
      var(--paper-rule) 20px,
      var(--paper-rule) 21px
    );
    background-color: #fcfaf6;
    border-radius: 2px;
    padding: 4px 8px;
    font-family: 'Source Serif 4', serif;
    font-size: 13px;
    color: var(--ink);
    resize: vertical;
    outline: none;
  }

  .scribble:focus { border-color: var(--ink-light); }

  /* HINT */
  .hint {
    font-size: 11.5px;
    color: var(--accent2);
    font-style: italic;
    margin: 4px 0 0 1.75rem;
    padding-left: 8px;
    border-left: 2px solid var(--accent2);
  }

  /* FEEDBACK */
  .check-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 0.5rem 0 0 1.75rem;
  }

  .btn-check {
    font-family: 'Source Serif 4', serif;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-mid);
    background: transparent;
    border: 1px solid var(--ink-mid);
    padding: 3px 12px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .btn-check:hover { background: var(--ink); color: var(--paper); }

  .feedback {
    font-size: 12px;
    padding: 2px 10px;
    border-radius: 2px;
    display: none;
    font-style: italic;
    line-height: 1.5;
    max-width: 420px;
  }

  .feedback.show { display: inline-block; }
  .feedback.ok { background: var(--accent2-light); color: var(--accent2); border-left: 3px solid var(--accent2); }
  .feedback.no { background: #fdf0ec; color: var(--accent); border-left: 3px solid var(--accent); }

  /* PROGRESS */
  .progress-section {
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .pbar-track {
    flex: 1;
    height: 5px;
    background: var(--rule-line);
    border-radius: 100px;
    overflow: hidden;
  }

  .pbar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 100px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .pbar-label { font-size: 11px; color: var(--ink-light); white-space: nowrap; }

  /* SCORE CARD */
  .score-card {
    display: none;
    margin-top: 2rem;
    border: 2px solid var(--ink);
    padding: 1.5rem 2rem;
    text-align: center;
    position: relative;
    background: var(--paper);
  }

  .score-card::before {
    content: '';
    position: absolute;
    inset: 4px;
    border: 1px solid var(--ink-mid);
    pointer-events: none;
    opacity: 0.3;
  }

  .score-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 6px;
  }

  .score-msg { font-size: 14px; color: var(--ink-mid); font-style: italic; margin-bottom: 14px; }

  .reset-btn {
    font-family: 'Source Serif 4', serif;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--paper);
    background: var(--ink);
    border: none;
    padding: 7px 24px;
    border-radius: 2px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .reset-btn:hover { background: var(--accent); }

  /* PRINT */
  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; padding: 2rem 2.5rem; }
    .page::before { opacity: 0.3; }
    .btn-check, .reset-btn { display: none; }
    .feedback { display: none !important; }
    .scribble { min-height: 60px; background: repeating-linear-gradient(transparent, transparent 20px, #e8e0d0 20px, #e8e0d0 21px); }
    .score-card { display: none !important; }
    .progress-section { display: none; }
  }

  /* OPTIONS single column for long text */
  .options.single { grid-template-columns: 1fr; }
</style>
</head>
<body>

<div class="page">

  <div class="ws-header">
    <div class="ws-title">Properties of Operations</div>
    <div class="ws-subtitle">Commutative · Associative · Distributive · Practice Worksheet</div>
  </div>

  <div class="info-row">
    <div class="info-field"><span class="info-label">Student Name</span><input class="info-line" type="text" placeholder=""></div>
    <div class="info-field"><span class="info-label">Class / Section</span><input class="info-line" type="text" placeholder=""></div>
    <div class="info-field"><span class="info-label">Date</span><input class="info-line" type="text" placeholder=""></div>
  </div>

  <div class="progress-section">
    <div class="pbar-track"><div class="pbar-fill" id="pbar"></div></div>
    <div class="pbar-label" id="plabel">0 / 15 answered</div>
  </div>

  <div id="questions-container"></div>

  <div class="score-card" id="scoreCard">
    <div class="score-title" id="scoreText"></div>
    <div class="score-msg" id="scoreMsg"></div>
    <button class="reset-btn" onclick="resetAll()">Try Again</button>
  </div>

</div>

<script>
const QS = [
  { id:1, section:"Part A — Commutative Property of Addition",
    type:"fill", answer:"3p/2 + 4q",
    text:"Write the equivalent form of <span class='expr'>4q + 3p/2</span> using the commutative property for addition.",
    hint:"Swap the order of the two terms."
  },
  { id:2, section:null, type:"mcq",
    text:"Four students found the equivalent form of <span class='expr'>4p + (−5q + 6r)</span> using commutative property. Who did it correctly?",
    opts:["Theo and Tess","Tess and Tyra","Tony and Theo","Tyra and Tony"], ans:0,
    explain:"Theo: (6r − 5q) + 4p ✓ and Tess: 4p + (6r − 5q) ✓ both correctly apply commutative property."
  },
  { id:3, section:null, type:"mcq", single:true,
    text:"Which shows <em>all</em> equivalent forms of <span class='expr'>−2a + b − 3c</span> via commutative property?",
    opts:[
      "−2a+b−3c → b−2a−3c → b−3c−2a → −3c+b−2a → −3c−2a+b → −2a−3c+b",
      "−2a+b−3c → b−2a−3c → b−3c−2a → −3c+b−2a → b−3c−2a → b−2a−3c",
      "−2a+b−3c → b−2a−3c → b−3c−2a → −3c+b−2a → −3c−2a+b → b−2a−3c",
      "−2a+b−3c → b−2a−3c → −3c−2a+b → −3c+b−2a → −3c−2a+b → −2a−3c+b"
    ], ans:0, explain:"The first option lists all 6 unique permutations of the three terms."
  },
  { id:4, section:null, type:"mcq", single:true,
    text:"Which shows <em>all</em> equivalent forms of <span class='expr'>−5x + 7y − z</span> via commutative property?",
    opts:[
      "−5x+7y−z → 7y−5x−z → 7y−z−5x → −z+7y−5x → −z−5x+7y → −5x−z+7y",
      "−5x+7y−z → −z+7y−5x → 7y−z−5x → −z+7y−5x → −z−5x+7y → −5x−z+7y",
      "−5x+7y−z → 7y−5x−z → −z−5x+7y → −z+7y−5x → −z−5x+7y → −5x−z+7y",
      "−5x+7y−z → 7y−5x−z → 7y−z−5x → −z+7y−5x → −z−5x+7y → 7y−5x−z"
    ], ans:0, explain:"All 6 permutations of the three terms are listed in the first option."
  },
  { id:5, section:"Part B — Associative Property of Addition",
    type:"mcq",
    text:"Which is the equivalent form of <span class='expr'>3a − (7b + 5c)</span> using the associative property?",
    opts:["(3a − 7b) + 5c","(3a + 7b) + 5c","(3a + 7b) − 5c","(3a − 7b) − 5c"], ans:3,
    explain:"3a − (7b + 5c) = 3a + (−7b − 5c) = (3a − 7b) − 5c by regrouping."
  },
  { id:6, section:null, type:"mcq", single:true,
    text:"Steps apply associative property to <span class='expr'>((3a−b)−5c)+7d</span>. Which statement is correct?",
    opts:[
      "Step 1 is wrong: ((3a−b)−5c)+7d = (3a−(b−5c))+7d",
      "Step 2 is wrong: (3a+(−b−5c))+7d = 3a−((b−5c))+7d",
      "Step 3 is wrong: 3a+((−b−5c)+7d) = 3a+(−b−(5c−7d))",
      "All steps are correct"
    ], ans:2, explain:"Step 3 incorrectly changes the sign of 7d when regrouping."
  },
  { id:7, section:null, type:"mcq", single:true,
    text:"Steps apply associative property to <span class='expr'>((2x−3y)+z)−5w</span>. Which statement is correct?",
    opts:[
      "Step 1 is wrong: ((2x−3y)+z)−5w = (2x+(3y−z))−5w",
      "Step 2 is wrong: (2x−(3y−z))−5w = 2x−((3y−z)+5w)",
      "Step 3 is wrong: 2x−((3y+z)−5w) = 2x−(3y−(z−5w))",
      "All steps are correct"
    ], ans:1, explain:"Step 2 incorrectly changes the sign of 5w when regrouping."
  },
  { id:8, section:"Part C — Commutative Property of Multiplication",
    type:"mcq",
    text:"If both commutative properties are applied <em>once</em> to <span class='expr'>(x−4)+3(5b−(pq)r)</span>, we get:",
    opts:[
      "3(5b−p(qr))+(x−4)",
      "(x−4)+3(5b−p(qr))",
      "3(5b−(qp)r)+(x−4)",
      "(x−4)+3(5b−(qp)r)"
    ], ans:2, explain:"Commutative for addition swaps the two main groups; commutative for multiplication swaps p·q to q·p."
  },
  { id:9, section:null, type:"mcq", single:true,
    text:"Commutative property for addition applied <em>only once inside</em> [ ] of <span class='expr'>[(x+3yz)−2pqr]−5qrs</span>:",
    opts:[
      "−5qrs+[(x+3yz)−2pqr]",
      "[−2pqr+(x+3yz)]−5qrs",
      "[x+(3yz−2pqr)]−5qrs",
      "[−2pqr+(3yz+x)]−5qrs"
    ], ans:1, explain:"Inside the brackets, (x+3yz) and −2pqr swap: −2pqr + (x+3yz)."
  },
  { id:10, section:null, type:"mcq",
    text:"Which expression is equivalent to <span class='expr'>4(k(−3ab)z)</span>?",
    opts:["3k(4zab)","4z(−3kab)","34kabz","−34kabz"], ans:1,
    explain:"4·k·(−3ab)·z = 4·(−3ab)·k·z = 4z(−3kab) by commutative multiplication."
  },
  { id:11, section:null, type:"mcq",
    text:"Which expression is equivalent to <span class='expr'>−2(p(3xy)k)</span>?",
    opts:["−23pxyk","3p(2kxy)","−2k(3pxy)","23pxyk"], ans:2,
    explain:"−2·p·(3xy)·k = −2·k·(3xy)·p = −2k(3pxy) by commutative multiplication."
  },
  { id:12, section:"Part D — Identify the Property",
    type:"mcq", single:true,
    text:"Which property gives: <span class='expr'>2+(ab−3(x+(5y)z)) = (ab−3(x+(5y)z))+2</span>?",
    opts:["Commutative property of addition","Commutative property of multiplication","Associative property of multiplication","Associative property of addition"], ans:0,
    explain:"The two addends swap order: A + B = B + A — commutative property of addition."
  },
  { id:13, section:null, type:"mcq", single:true,
    text:"Which property gives: <span class='expr'>6((b−3p)+(5q)r)+3 = 6(b−(3p−(5q)r))+3</span>?",
    opts:["Commutative property of multiplication","Associative property of addition","Commutative property of addition","Associative property of multiplication"], ans:1,
    explain:"The grouping changes, not the order — associative property of addition."
  },
  { id:14, section:"Part E — Distributive Property",
    type:"fill", answer:"3ax - 2bx + 2cx",
    text:"Write an expression equivalent to <span class='expr'>−x(−3a + 2b − 2c)</span> after using the distributive property.",
    hint:"Multiply −x by each term: −x·(−3a), −x·2b, −x·(−2c)"
  },
  { id:15, section:null, type:"fill", answer:"2ax + 10bx - 3cx",
    text:"Write an expression equivalent to <span class='expr'>2x(a + 5b − 3/2 c)</span> after using the distributive property.",
    hint:"Multiply 2x by each term: 2x·a, 2x·5b, 2x·(3/2)c"
  }
];

let answered = {};
const total = QS.length;

function normA(s) {
  return s.toLowerCase().replace(/\s+/g,'').replace(/[×*·]/g,'').replace(/−/g,'-');
}

function build() {
  const cont = document.getElementById('questions-container');
  cont.innerHTML = '';
  let lastSec = null;

  QS.forEach(q => {
    if (q.section && q.section !== lastSec) {
      lastSec = q.section;
      cont.innerHTML += `<div class="section-hd"><span class="section-tag">${q.section.split('—')[0].trim()}</span><span class="section-name">${q.section.split('—')[1].trim()}</span><div class="section-rule"></div></div>`;
    }

    let html = `<div class="q" id="q${q.id}">`;
    html += `<div class="q-row"><span class="q-num">${q.id}.</span><span class="q-text">${q.text}</span></div>`;

    if (q.type === 'mcq') {
      html += `<div class="options${q.single?' single':''}">`;
      q.opts.forEach((o, j) => {
        html += `<label class="opt-label" id="ol_${q.id}_${j}"><input type="radio" name="q${q.id}" value="${j}" onchange="selectOpt(${q.id},${j})"><div class="opt-bubble"></div><span class="opt-text">${o}</span></label>`;
      });
      html += `</div>`;
    } else {
      html += `<div class="fill-wrap"><span class="fill-label">Answer:</span><input class="fill-input" type="text" id="ans_${q.id}" placeholder="Write your answer…" onkeydown="if(event.key==='Enter')checkFill(${q.id})"></div>`;
      if (q.hint) html += `<div class="hint">Hint: ${q.hint}</div>`;
    }

    html += `<div class="scribble-wrap"><span class="scribble-label">Working / Notes</span><textarea class="scribble" id="scr_${q.id}" placeholder="Show your work here…"></textarea></div>`;
    html += `<div class="check-row"><button class="btn-check" onclick="${q.type==='mcq'?`checkMcq(${q.id})`:`checkFill(${q.id})`}">Check</button><span class="feedback" id="fb_${q.id}"></span></div>`;
    html += `</div>`;
    cont.innerHTML += html;
  });
}

function selectOpt(qid) {
  if (answered[qid] !== undefined) return;
}

function checkMcq(qid) {
  if (answered[qid] !== undefined) return;
  const q = QS.find(x=>x.id===qid);
  const sel = document.querySelector(`input[name="q${qid}"]:checked`);
  if (!sel) { alert('Please select an option first.'); return; }
  const j = parseInt(sel.value);
  const correct = j === q.ans;
  const fb = document.getElementById('fb_'+qid);
  fb.className = 'feedback show ' + (correct?'ok':'no');
  fb.textContent = correct ? '✓ Correct!' : `✗ Incorrect — ${q.explain}`;
  document.querySelectorAll(`input[name="q${qid}"]`).forEach(r => r.disabled = true);
  answered[qid] = correct;
  updateProgress();
}

function checkFill(qid) {
  if (answered[qid] !== undefined) return;
  const q = QS.find(x=>x.id===qid);
  const val = document.getElementById('ans_'+qid).value.trim();
  if (!val) { alert('Please write your answer first.'); return; }
  const userN = normA(val);
  const correct = (q.answer.split('|').map(normA)).some(a => a===userN);
  const fb = document.getElementById('fb_'+qid);
  fb.className = 'feedback show ' + (correct?'ok':'no');
  fb.textContent = correct ? '✓ Correct!' : `✗ Incorrect — Answer: ${q.answer}`;
  document.getElementById('ans_'+qid).disabled = true;
  answered[qid] = correct;
  updateProgress();
}

function updateProgress() {
  const done = Object.keys(answered).length;
  document.getElementById('pbar').style.width = Math.round(done/total*100)+'%';
  document.getElementById('plabel').textContent = done+' / '+total+' answered';
  if (done === total) {
    const score = Object.values(answered).filter(Boolean).length;
    const sc = document.getElementById('scoreCard');
    sc.style.display = 'block';
    document.getElementById('scoreText').textContent = `Score: ${score} / ${total}`;
    const p = Math.round(score/total*100);
    document.getElementById('scoreMsg').textContent = p>=90 ? 'Excellent work! You have mastered these properties.' : p>=70 ? 'Good effort! Review the questions you missed and try again.' : 'Keep practising! Go through your notes and try once more.';
    sc.scrollIntoView({behavior:'smooth'});
  }
}

function resetAll() {
  answered = {};
  document.getElementById('pbar').style.width = '0%';
  document.getElementById('plabel').textContent = '0 / '+total+' answered';
  document.getElementById('scoreCard').style.display = 'none';
  build();
}

build();
</script>
</body>
</html>
